{% extends "base.html" %}

{% block content %}
    <h2>Please Login here!</h2>
        <form method="post">
            {{ form.hidden_tag() }}

            <p>
                {{ form.username.label }}<br>
                {{ form.username }}<br>
            </p>
            <p>
                {{ form.password.label }}<br>
                {{ form.password }}<br>
            </p>
            <p>{{ form.submit() }}</p>
        </form>

{% endblock %}
