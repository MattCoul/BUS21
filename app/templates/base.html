<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sketchbook Task Organiser{% endblock %}</title>
</head>
<body>
    <hr>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    {% endwith %}
    <main>{% block content %}    {% endblock %}</main>

<footer>
    <hr>
    <p>Sketchbook Task Organiser:
        <a href="{{ url_for('index') }}">Home</a>,
        <a href="{{ url_for('task_display') }}">Task Display</a>
    </p>
</footer>

</body>
</html>
